<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - STN App</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Access Control</span>
        <h1>Dashboard</h1>
        <div class="page-subtitle">
          Load user access, select business area, and launch the required STN action.
        </div>
      </div>
    </div>

    <div class="page-shell">
      <div class="card">
        <div class="section-title">User Access Lookup</div>
        <div class="form-grid-1">
          <div class="field-block">
            <label for="emailInput">Test User Email</label>
            <input id="emailInput" type="text" placeholder="Enter email from app.STNUserAccess" />
          </div>
        </div>
        <div class="action-row" style="margin-top: 12px;">
          <button id="loadUserBtn">Load User Access</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">User Summary</div>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="label">User Name</div>
            <div class="value" id="userName"></div>
          </div>
          <div class="summary-item">
            <div class="label">Email</div>
            <div class="value" id="userEmail"></div>
          </div>
          <div class="summary-item">
            <div class="label">Role</div>
            <div class="value" id="userRole"></div>
          </div>
          <div class="summary-item">
            <div class="label">Holding</div>
            <div class="value" id="holdingName"></div>
          </div>
          <div class="summary-item">
            <div class="label">Manufacturing</div>
            <div class="value" id="allowManu"></div>
          </div>
          <div class="summary-item">
            <div class="label">Distribution</div>
            <div class="value" id="allowDist"></div>
          </div>
          <div class="summary-item">
            <div class="label">Active</div>
            <div class="value" id="isActive"></div>
          </div>
          <div class="summary-item">
            <div class="label">Selected Area</div>
            <div class="value" id="selectedArea">None</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Business Area</div>
        <div class="header-strip">
          <button id="selectManuBtn">Manufacturing</button>
          <button id="selectDistBtn">Distribution</button>
        </div>
      </div>

      <div class="card soft">
        <div class="section-title">Available Actions</div>
        <div class="action-row">
          <button id="postInboundBtn">Post Inbound</button>
          <button id="postOutboundBtn">Post Outbound</button>
          <button id="checkSTNBtn" class="success">Check STN</button>
          <button id="backBtn" class="secondary">Back</button>
        </div>
      </div>

      <div class="card output-card">
        <pre id="output">Waiting...</pre>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
