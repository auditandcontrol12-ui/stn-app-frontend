<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - STN App</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Access Control</span>
        <h1>Dashboard</h1>
        <div class="page-subtitle">
          Signed-in user details and allowed business areas.
        </div>
      </div>
    </div>

    <div class="page-shell">
      <div class="card">
        <div class="section-title">User Summary</div>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="label">User Name</div>
            <div class="value" id="userName"></div>
          </div>
          <div class="summary-item">
            <div class="label">Email</div>
            <div class="value" id="userEmail"></div>
          </div>
          <div class="summary-item">
            <div class="label">Role</div>
            <div class="value" id="userRole"></div>
          </div>
          <div class="summary-item">
            <div class="label">Holding</div>
            <div class="value" id="holdingName"></div>
          </div>
          <div class="summary-item">
            <div class="label">Selected Area</div>
            <div class="value" id="selectedArea">None</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Business Area</div>
        <div class="header-strip" id="businessAreaButtons"></div>
      </div>

      <div class="card soft">
        <div class="section-title">Create STN</div>
        <div class="action-row">
          <button id="postInboundBtn">Post Inbound</button>
          <button id="postOutboundBtn">Post Outbound</button>
        </div>
      </div>

      <div class="card soft">
        <div class="section-title">STN Workbench</div>
        <div class="action-row">
          <button id="checkSTNBtn" class="success">Check STN</button>
          <button id="myDraftsBtn">My Drafts</button>
          <button id="teamDraftsBtn" style="display:none;">Team Drafts</button>
        </div>
      </div>

      <div class="card soft">
        <div class="section-title">Stock Count</div>
        <div class="action-row">
          <button id="startStockCountBtn" disabled title="Coming Soon">Start Stock Count - Coming Soon</button>
          <button id="assignStockCountBtn" style="display:none;">Assign Stock Count</button>
          <button id="myPendingStockCountsBtn">My Pending Stock Counts</button>
          <button id="assignedStockCountsBtn" class="success" style="display:none;">Assigned Stock Counts</button>
        </div>
      </div>

      <div class="card soft">
        <div class="section-title">Reconcile</div>
        <div class="action-row">
          <button id="reconcileStockBtn">Reconcile Stock</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </div>

      <!-- <div class="card output-card">
        <pre id="output">Loading user access...</pre>
      </div>
    </div>
  </div> -->

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
