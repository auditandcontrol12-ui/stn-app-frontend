<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <title>No Access - STN App</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Access Restricted</span>
        <h1>No Access</h1>
        <div class="page-subtitle">
          Your Microsoft account is authenticated, but it is not allowed to use this service.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="info-banner">
        Please contact the administrator if you need access to the STN application.
      </div>
    </div>

    <div class="card soft">
      <div class="action-row">
        <button onclick="window.location.href='/logout'" class="secondary">Logout</button>
        <button onclick="window.location.href='/'">Go Home</button>
      </div>
    </div>
  </div>
</body>
</html>
