<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <title>Manage Warehouse</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">System Setup</span>
        <h1>Manage Warehouse</h1>
        <div class="page-subtitle">
          Update warehouse names and active status in the central warehouse master.
        </div>
      </div>
    </div>

    <div class="page-shell">
      <div class="card">
        <div class="section-title">Warehouse List</div>

        <div class="lines-table-wrap">
          <table class="lines-table">
            <thead>
              <tr>
                <th>Business Area</th>
                <th>Warehouse Code</th>
                <th>Warehouse Name</th>
                <th>Is Active</th>
                <th class="col-actions">Action</th>
              </tr>
            </thead>
            <tbody id="warehouseTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card soft">
        <div class="action-row">
          <button id="backDashboardBtn" class="secondary">Back to Dashboard</button>
        </div>
      </div>

      <div id="pageLoader" class="page-loader" aria-hidden="true">
        <div class="page-loader-card">
          <div class="page-loader-spinner"></div>
          <div id="pageLoaderText" class="page-loader-text">Working...</div>
        </div>
      </div>

      <!-- <div class="card output-card">
        <pre id="output">Waiting...</pre>
      </div> -->
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/manage-warehouse.js"></script>
</body>
</html>
