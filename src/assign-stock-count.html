<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assign Stock Count</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Manager Action</span>
        <h1>Assign Stock Count</h1>
        <div class="page-subtitle">
          Create and assign a stock count to a supervisor.
        </div>
      </div>
    </div>

    <div class="page-shell">
      <div class="card">
        <div class="section-title">Header</div>
        <div class="form-grid">
          <div class="field-block">
            <label for="businessArea">Business Area</label>
            <input id="businessArea" type="text" readonly />
          </div>

          <div class="field-block">
            <label for="warehouseCode">Warehouse</label>
            <select id="warehouseCode">
              <option value="">Select warehouse</option>
            </select>
          </div>

          <div class="field-block">
            <label for="assignedToUserEmail">Assign To Supervisor</label>
            <select id="assignedToUserEmail">
              <option value="">Select supervisor</option>
            </select>
          </div>

          <div class="field-block">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" placeholder="Optional remarks"></textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Lines</div>
        <div class="action-row" style="margin-bottom:14px;">
          <button id="addLineBtn">Add Line</button>
        </div>

        <div class="lines-table-wrap">
          <table class="lines-table">
            <thead>
              <tr>
                <th class="col-line">Line</th>
                <th>Item Code</th>
                <th>Item Name</th>
                <th>UOM</th>
                <th>Batch Number</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="linesBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card soft">
        <div class="action-row">
          <button id="assignBtn" class="success">Assign Stock Count</button>
          <button id="backDashboardBtn" class="secondary">Back to Dashboard</button>
        </div>
      </div>

      <!-- <div class="card output-card">
        <pre id="output">Waiting...</pre>
      </div> -->
    </div>
  </div>

  <script src="/js/app.js"></script>
  <!-- <div id="pageLoader" class="page-loader" aria-hidden="true">
    <div class="page-loader-card">
      <div class="page-loader-spinner"></div>
      <div id="pageLoaderText" class="page-loader-text">Loading...</div>
    </div>
  </div> -->

  <script src="/js/assign-stock-count.js"></script>
</body>
</html>
