<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STN App</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Stock Transfer Note</span>
        <h1>STN App</h1>
        <div class="page-subtitle">
          Internal inventory movement capture for Manufacturing and Distribution.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Welcome</div>
      <div class="info-banner">
        Use this application to create & manage stock movement drafts with structured validation and printable STN formatting.
      </div>
    </div>

    <div class="card soft">
      <div class="action-row">
        <button id="loginBtn">Login with Microsoft</button>
        <button id="dashboardBtn" class="secondary">Open Dashboard</button>
        <button id="apiTestBtn" class="success">Test API</button>
      </div>
    </div>

    <div class="card output-card">
      <pre id="output">Waiting...</pre>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
